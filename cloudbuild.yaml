steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'build-image'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
    id: 'push-image'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GEMINI_API_KEY=${_GEMINI_API_KEY},GROQ_API_KEY=${_GROQ_API_KEY},SUPABASE_URL=${_SUPABASE_URL},SUPABASE_SERVICE_KEY=${_SUPABASE_SERVICE_KEY},SUPABASE_JWT_SECRET=${_SUPABASE_JWT_SECRET},TAVILY_API_KEY=${_TAVILY_API_KEY},STRIPE_SECRET_KEY=${_STRIPE_SECRET_KEY},STRIPE_WEBHOOK_SECRET=${_STRIPE_WEBHOOK_SECRET},STRIPE_PRO_PRICE_ID=${_STRIPE_PRO_PRICE_ID},HUNTER_API_KEY=${_HUNTER_API_KEY},EXA_API_KEY=${_EXA_API_KEY},APP_ENV=production,CORS_ORIGINS=${_CORS_ORIGINS}'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=3600'
      - '--max-instances=100'
      - '--quiet'
    id: 'deploy-cloud-run'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'

# Substitution variables - set these in Cloud Build trigger
substitutions:
  _REGION: 'europe-west1'
  _SERVICE_NAME: 'backend-carniq'
  _ARTIFACT_REPO: 'cloud-run-source-deploy/backend-career-twin'
  _GEMINI_API_KEY: ''
  _GROQ_API_KEY: ''
  _SUPABASE_URL: ''
  _SUPABASE_SERVICE_KEY: ''
  _SUPABASE_JWT_SECRET: ''
  _TAVILY_API_KEY: ''
  _STRIPE_SECRET_KEY: ''
  _STRIPE_WEBHOOK_SECRET: ''
  _STRIPE_PRO_PRICE_ID: ''
  _HUNTER_API_KEY: ''
  _EXA_API_KEY: ''
  _CORS_ORIGINS: ''

timeout: '3600s'
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
